<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godziny Pizza</title>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        .no-print { background: #fff8f2; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .total-row { background: #2c3e50; color: white; font-weight: bold; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-print { background: #27ae60; color: white; }
        .btn-edit { background: #3498db; color: white; }
        #editSection { display: none; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 15px; }
        .worker-input { margin-bottom: 8px; width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #bbb; border-radius: 4px; }
        @media print { .no-print { display: none !important; } .card { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>

<div class="card">
    <div class="no-print">
        <div class="controls">
            <div>
                <label>Wybierz osobę:</label><br>
                <select id="workerSelect" onchange="updateUI()"></select>
            </div>
            <button class="btn btn-edit" onclick="toggleEdit()">⚙️ Edytuj listę osób</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Drukuj PDF</button>
        </div>

        <div id="editSection">
            <h4 style="margin:0 0 10px 0">Wpisz imiona (pozostaw puste, aby usunąć):</h4>
            <div id="inputContainer"></div>
            <button class="btn" style="background:#2ecc71; color:white; margin-top:10px; width:100%" onclick="saveWorkers()">ZAPISZ ZMIANY</button>
        </div>
    </div>

    <div style="text-align:center">
        <h1 id="displayWorker">Godziny Pizza</h1>
        <p id="displayDates" style="color: #666; font-weight: bold;"></p>
    </div>

    <table>
        <thead>
            <tr><th>Dzień</th><th>Data</th><th>Od</th><th>Do</th><th>Suma (h)</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="4" style="text-align:right; padding-right:15px">SUMA TYGODNIOWA:</td>
                <td id="grandTotal">0.00</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    const days = ["Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota", "Niedziela"];
    // Ładujemy listę, jeśli jest pusta, zaczynamy od zera (bez napisów "Pracownik X")
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];

    function init() {
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));
        const sun = new Date(new Date(mon).setDate(mon.getDate() + 6));
        document.getElementById('displayDates').innerText = `Okres: ${mon.toLocaleDateString()} - ${sun.toLocaleDateString()}`;

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        days.forEach((d, i) => {
            const date = new Date(mon); date.setDate(mon.getDate() + i);
            tbody.innerHTML += `<tr><td><strong>${d}</strong></td><td>${date.toLocaleDateString()}</td>
                <td><input type="time" id="s${i}" oninput="calc(${i})"></td>
                <td><input type="time" id="e${i}" oninput="calc(${i})"></td>
                <td id="r${i}" style="font-weight:bold; color:var(--primary)">0.00</td></tr>`;
        });
        renderWorkerList();
    }

    function renderWorkerList() {
        const select = document.getElementById('workerSelect');
        const container = document.getElementById('inputContainer');
        select.innerHTML = '<option value="">-- Wybierz osobę --</option>';
        container.innerHTML = "";

        // Pokazujemy 10 pól do edycji. Jeśli pole jest puste, nie dodajemy go do listy wyboru.
        for(let i=0; i<10; i++) {
            const val = workers[i] || "";
            if(val) {
                select.innerHTML += `<option value="${val}">${val}</option>`;
            }
            container.innerHTML += `<input type="text" class="worker-input" id="winp${i}" value="${val}" placeholder="Wpisz imię pracownika nr ${i+1}">`;
        }
    }

    function toggleEdit() {
        const s = document.getElementById('editSection');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
    }

    function saveWorkers() {
        let newWorkers = [];
        for(let i=0; i<10; i++) {
            const val = document.getElementById(`winp${i}`).value.trim();
            // Zapisujemy tylko niepuste wartości
            newWorkers[i] = val; 
        }
        workers = newWorkers;
        localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderWorkerList();
        toggleEdit();
        alert("Lista została zaktualizowana!");
    }

    function updateUI() {
        document.getElementById('displayWorker').innerText = document.getElementById('workerSelect').value || "Godziny Pizza";
    }

    function calc(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        if(s && e) {
            let diff = (new Date(`2000-01-01T${e}`) - new Date(`2000-01-01T${s}`)) / 3600000;
            if(diff < 0) diff += 24;
            document.getElementById(`r${i}`).innerText = diff.toFixed(2);
        }
        let total = 0;
        for(let j=0; j<7; j++) total += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }
    init();
</script>
</body>
</html>
