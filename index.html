<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godziny Pizza - Panel Sterowania</title>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --text: #2c3e50; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        /* DASHBOARD */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .worker-card { 
            background: var(--white); padding: 20px; border-radius: 15px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .worker-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .worker-card.active { border-color: var(--primary); background: #fffcf9; box-shadow: 0 0 15px rgba(230,126,34,0.2); }
        .card-name { display: block; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; color: var(--primary); }
        .card-hours { font-size: 1.8rem; font-weight: 900; color: var(--text); }

        /* TABELA EDYCJI */
        #detailsWrapper { 
            display: none; background: var(--white); padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px;
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        th { background: #eee; color: #444; padding: 10px; text-transform: uppercase; font-size: 0.8rem; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .total-row { background: var(--text); color: white; font-weight: bold; }
        
        select, .date-input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-print { background: #27ae60; color: white; width: calc(100% - 10px); font-size: 1.1rem; }
        .btn-report { background: #8e44ad; color: white; width: calc(100% - 10px); font-size: 1.1rem; }
        .btn-close { background: #95a5a6; color: white; width: calc(100% - 10px); }
        .btn-wolne { background: #f8f9fa; border: 1px solid #ddd; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        
        /* RAPORT PODGLĄD */
        #reportWrapper { display: none; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .report-item { margin-bottom: 50px; border-bottom: 2px dashed #eee; padding-bottom: 20px; }

        .admin-tools { text-align: center; margin-top: 50px; border-top: 1px solid #ddd; padding-top: 20px; }
        #editSection { display: none; margin-top: 20px; background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }

        @media print {
            .no-print { display: none !important; }
            #reportWrapper { display: block !important; box-shadow: none; padding: 0; }
            body { background: white; padding: 0; }
            .report-item { page-break-after: always; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="no-print">🍕 Panel Godziny Pizza</h1>

    <div class="no-print" style="text-align:center;">
        <button class="btn btn-print" onclick="window.print()">🖨️ DRUKUJ OD RAZU (PDF)</button>
        <button class="btn btn-report" onclick="toggleReport()">📄 POKAŻ RAPORT ZBIORCZY</button>
    </div>

    <div id="workerDashboard" class="dashboard no-print"></div>

    <div id="reportWrapper">
        <div class="no-print" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="color: #8e44ad; margin:0;">Raport Zbiorczy</h2>
            <button class="btn btn-close" style="width:auto;" onclick="toggleReport()">✕ ZAMKNIJ RAPORT</button>
        </div>
        <div id="reportContent"></div>
    </div>

    <div id="detailsWrapper">
        <div class="table-header">
            <h2 id="currentWorkerName" style="margin:0; color:var(--primary);">Pracownik</h2>
            <span style="font-size: 0.9rem; color: #888;">Edycja godzin</span>
        </div>
        <table>
            <thead><tr><th>Dzień</th><th>Data</th><th>Od — Do</th><th>Suma</th></tr></thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="3" style="text-align:right; padding-right:15px">SUMA TYGODNIA:</td>
                    <td id="grandTotal">0.00</td>
                </tr>
            </tfoot>
        </table>
        <button class="btn btn-close no-print" onclick="toggleWorker(activeWorker)">✕ ZAMKNIJ EDYCJĘ</button>
    </div>

    <div class="admin-tools no-print">
        <button class="btn" style="background:#3498db; color:white;" onclick="toggleEdit()">⚙️ Lista Pracowników</button>
        <div id="editSection">
            <div id="inputContainer" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;"></div>
            <button class="btn" style="background:#2ecc71; color:white; width:100%; margin-bottom:10px;" onclick="saveWorkers()">ZAPISZ LISTĘ</button>
            <button class="btn btn-close" style="background:#e74c3c; width:100%;" onclick="toggleEdit()">ZAMKNIJ LISTĘ</button>
        </div>
    </div>
</div>

<script>
    const daysArr = ["Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota", "Niedziela"];
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];
    let allHoursData = JSON.parse(localStorage.getItem('godzinyPizzaDetailedData')) || {}; 
    let activeWorker = "";

    function getTimeOptions() {
        let htm = '<option value="">--:--</option>'; 
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=30) {
                let hh = h<10?'0'+h:h, mm = m===0?'00':m;
                htm += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        return htm;
    }

    function init() {
        renderDashboard();
        renderEditList();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const tOpts = getTimeOptions();
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));

        daysArr.forEach((d, i) => {
            let dateCell = (i === 0) 
                ? `<input type="date" id="mondayDate" class="date-input" value="${mon.toISOString().split('T')[0]}" onchange="updateTableDates(); updateReport();">`
                : `<span id="date-${i}"></span>`;
            tbody.innerHTML += `<tr><td><strong>${d}</strong></td><td>${dateCell}</td><td>
                <select id="s${i}" onchange="saveData(${i})">${tOpts}</select>
                <select id="e${i}" onchange="saveData(${i})">${tOpts}</select>
                <button class="btn-wolne no-print" onclick="setWolne(${i})">W</button>
                </td><td id="r${i}" style="font-weight:bold;">0.00</td></tr>`;
        });
        updateTableDates();
    }

    function renderDashboard() {
        const dash = document.getElementById('workerDashboard');
        dash.innerHTML = "";
        workers.forEach(w => {
            const sum = allHoursData[w]?.total || "0.00";
            const card = document.createElement('div');
            card.className = `worker-card ${activeWorker === w ? 'active' : ''}`;
            card.onclick = () => toggleWorker(w);
            card.innerHTML = `<span class="card-name">${w}</span><span class="card-hours">${sum}h</span>`;
            dash.appendChild(card);
        });
    }

    function toggleWorker(name) {
        document.getElementById('reportWrapper').style.display = "none";
        if (activeWorker === name || name === "") {
            activeWorker = "";
            document.getElementById('detailsWrapper').style.display = "none";
        } else {
            activeWorker = name;
            loadWorkerData(name);
            document.getElementById('detailsWrapper').style.display = "block";
            window.scrollTo({ top: document.getElementById('detailsWrapper').offsetTop - 20, behavior: 'smooth' });
        }
        renderDashboard();
    }

    function loadWorkerData(name) {
        document.getElementById('currentWorkerName').innerText = name;
        const data = allHoursData[name]?.days || Array(7).fill({s:"", e:"", r:"0.00"});
        data.forEach((day, i) => {
            document.getElementById(`s${i}`).value = day.s;
            document.getElementById(`e${i}`).value = day.e;
            document.getElementById(`r${i}`).innerText = day.r;
        });
        document.getElementById('grandTotal').innerText = allHoursData[name]?.total || "0.00";
    }

    function saveData(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`r${i}`);
        let diff = 0;
        if(s && e) {
            let sP = s.split(':'), eP = e.split(':');
            diff = (parseInt(eP[0]) + parseInt(eP[1])/60) - (parseInt(sP[0]) + parseInt(sP[1])/60);
            if (diff < 0) diff += 24;
            out.innerText = (s === e && s === "00:00") ? "0.00" : diff.toFixed(2);
        } else { out.innerText = "0.00"; }

        let total = 0, days = [];
        for(let j=0; j<7; j++) {
            total += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
            days.push({s:document.getElementById(`s${j}`).value, e:document.getElementById(`e${j}`).value, r:document.getElementById(`r${j}`).innerText});
        }
        allHoursData[activeWorker] = { total: total.toFixed(2), days: days };
        localStorage.setItem('godzinyPizzaDetailedData', JSON.stringify(allHoursData));
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        renderDashboard();
    }

    function toggleReport() {
        const rw = document.getElementById('reportWrapper');
        const dw = document.getElementById('detailsWrapper');
        activeWorker = "";
        dw.style.display = "none";
        renderDashboard();
        
        if(rw.style.display === "block") {
            rw.style.display = "none";
        } else {
            updateReport();
            rw.style.display = "block";
            window.scrollTo({ top: rw.offsetTop - 20, behavior: 'smooth' });
        }
    }

    function updateReport() {
        const content = document.getElementById('reportContent');
        const mon = new Date(document.getElementById('mondayDate').value);
        content.innerHTML = `<h2 style="text-align:center; border-bottom: 2px solid #333; padding-bottom:10px;">RAPORT ZBIORCZY: ${mon.toLocaleDateString()} - ${new Date(new Date(mon).setDate(mon.getDate()+6)).toLocaleDateString()}</h2>`;

        workers.forEach(w => {
            const data = allHoursData[w];
            if(!data) return;
            let htm = `<div class="report-item"><h3>Pracownik: ${w}</h3><table style="font-size:13px;"><thead><tr><th>Dzień</th><th>Data</th><th>Od</th><th>Do</th><th>Suma</th></tr></thead><tbody>`;
            daysArr.forEach((dn, i) => {
                const cur = new Date(mon); cur.setDate(mon.getDate() + i);
                htm += `<tr><td>${dn}</td><td>${cur.toLocaleDateString()}</td><td>${data.days[i].s || '--'}</td><td>${data.days[i].e || '--'}</td><td>${data.days[i].r}h</td></tr>`;
            });
            htm += `</tbody><tfoot><tr style="font-weight:bold; background:#f9f9f9;"><td colspan="4" style="text-align:right">SUMA:</td><td>${data.total}h</td></tr></tfoot></table></div>`;
            content.innerHTML += htm;
        });
    }

    function setWolne(i) { document.getElementById(`s${i}`).value = "00:00"; document.getElementById(`e${i}`).value = "00:00"; saveData(i); }
    function updateTableDates() {
        const mon = new Date(document.getElementById('mondayDate').value);
        daysArr.forEach((_, i) => { if (i > 0) {
            const cur = new Date(mon); cur.setDate(mon.getDate() + i);
            document.getElementById(`date-${i}`).innerText = cur.toLocaleDateString();
        }});
    }
    function renderEditList() {
        const con = document.getElementById('inputContainer'); con.innerHTML = "";
        for(let i=0; i<12; i++) con.innerHTML += `<input type="text" style="padding:10px; border:1px solid #ddd; border-radius:5px;" id="winp${i}" value="${workers[i]||''}" placeholder="Imię ${i+1}">`;
    }
    function toggleEdit() { const s = document.getElementById('editSection'); s.style.display = s.style.display==='block'?'none':'block'; }
    function saveWorkers() {
        let nw = []; for(let i=0; i<12; i++) { let v = document.getElementById(`winp${i}`).value.trim(); if(v) nw.push(v); }
        workers = nw; localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderDashboard(); toggleEdit();
    }
    init();
</script>
</body>
</html>
