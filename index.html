<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godziny Pizza - Panel Sterowania</title>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --text: #2c3e50; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; font-size: 1.5rem; }

        /* DASHBOARD */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .worker-card { 
            background: var(--white); padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 2px solid transparent;
        }
        .worker-card:hover { border-color: var(--primary); }
        .worker-card.active { border-color: var(--primary); background: #fffcf9; }
        .card-name { display: block; font-weight: bold; font-size: 0.9rem; color: var(--primary); }
        .card-hours { font-size: 1.4rem; font-weight: 900; color: var(--text); }

        /* TABELA EDYCJI */
        #detailsWrapper { 
            display: none; background: var(--white); padding: 15px; border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 30px;
        }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { background: #eee; padding: 8px; font-size: 0.75rem; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 5px; text-align: center; font-size: 0.85rem; }
        .total-row { background: var(--text); color: white; font-weight: bold; }
        
        select, .date-input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        .btn-report { background: #8e44ad; color: white; width: calc(100% - 10px); }
        .btn-print-final { background: #27ae60; color: white; }
        .btn-close { background: #95a5a6; color: white; }
        .btn-wolne { background: #f8f9fa; border: 1px solid #ddd; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        
        /* RAPORT A4 - MAKSYMALNA KOMPRESJA */
        #reportWrapper { display: none; background: white; padding: 10px; border-radius: 12px; margin-top: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } /* Dwie kolumny pracowników na A4 */
        .report-item { border: 1px solid #000; padding: 5px; margin-bottom: 5px; }
        .report-item h3 { margin: 0 0 3px 0; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #000; }
        .report-table { font-size: 8px !important; width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 1px 2px; text-align: center; }

        /* LISTA EDYCJI */
        .admin-tools { text-align: center; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 15px; }
        .worker-edit-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        @media print {
            @page { size: A4; margin: 0.3cm; }
            .no-print { display: none !important; }
            #reportWrapper { display: block !important; width: 100%; border:none; padding:0; }
            body { background: white; padding: 0; }
            .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .report-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="no-print">🍕 Godziny Pizza</h1>

    <div class="no-print" style="text-align:center;">
        <button class="btn btn-report" onclick="toggleReport()">📄 RAPORT</button>
    </div>

    <div id="workerDashboard" class="dashboard no-print"></div>

    <div id="reportWrapper">
        <div class="no-print" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 8px;">
            <h2 style="margin:0; font-size:1rem;">Podgląd A4</h2>
            <div>
                <button class="btn btn-print-final" onclick="window.print()">🖨️ DRUKUJ</button>
                <button class="btn btn-close" onclick="toggleReport()">✕</button>
            </div>
        </div>
        <div id="reportHeader" style="text-align:center; font-weight:bold; margin-bottom:10px; font-size:10px;"></div>
        <div id="reportContent" class="report-grid"></div>
    </div>

    <div id="detailsWrapper">
        <h2 id="currentWorkerName" style="margin:0 0 10px 0; color:var(--primary); font-size:1.1rem;">Pracownik</h2>
        <table>
            <thead><tr><th>Dzień</th><th>Data</th><th>Od — Do</th><th>Suma</th></tr></thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr class="total-row"><td colspan="3" style="text-align:right">SUMA:</td><td id="grandTotal">0.00</td></tr>
            </tfoot>
        </table>
        <button class="btn btn-close no-print" style="width:100%" onclick="toggleWorker('')">✕ ZAMKNIJ EDYCJĘ</button>
    </div>

    <div class="admin-tools no-print">
        <button class="btn" style="background:#3498db; color:white;" onclick="toggleEdit()">⚙️ Lista Pracowników</button>
        <div id="editSection" style="display:none; margin-top:15px; background:white; padding:15px; border-radius:8px; border:1px solid #ddd;">
            <div id="inputList"></div>
            <button class="btn" style="background:#2ecc71; color:white; width:100%;" onclick="addNewWorkerField()">+ Dodaj Miejsce</button>
            <button class="btn" style="background:var(--primary); color:white; width:100%; margin-top:10px;" onclick="saveWorkers()">ZAPISZ ZMIANY</button>
        </div>
    </div>
</div>

<script>
    const daysArr = ["Pn", "Wt", "Śr", "Czw", "Pt", "Sob", "Nie"];
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];
    let allHoursData = JSON.parse(localStorage.getItem('godzinyPizzaDetailedData')) || {}; 
    let activeWorker = "";

    function getTimeOptions() {
        let htm = '<option value="">--</option>'; 
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=30) {
                let hh = h<10?'0'+h:h, mm = m===0?'00':m;
                htm += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        return htm;
    }

    function init() {
        renderDashboard();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const tOpts = getTimeOptions();
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));

        daysArr.forEach((d, i) => {
            let dateCell = (i === 0) 
                ? `<input type="date" id="mondayDate" class="date-input" value="${mon.toISOString().split('T')[0]}" onchange="updateTableDates(); updateReport();">`
                : `<span id="date-${i}"></span>`;
            tbody.innerHTML += `<tr><td><strong>${d}</strong></td><td>${dateCell}</td><td>
                <select id="s${i}" onchange="saveData(${i})">${tOpts}</select>
                <select id="e${i}" onchange="saveData(${i})">${tOpts}</select>
                <button class="btn-wolne no-print" onclick="setWolne(${i})">W</button>
                </td><td id="r${i}" style="font-weight:bold;">0.00</td></tr>`;
        });
        updateTableDates();
    }

    function renderDashboard() {
        const dash = document.getElementById('workerDashboard');
        dash.innerHTML = "";
        workers.forEach(w => {
            const sum = allHoursData[w]?.total || "0.00";
            const card = document.createElement('div');
            card.className = `worker-card ${activeWorker === w ? 'active' : ''}`;
            card.onclick = () => toggleWorker(w);
            card.innerHTML = `<span class="card-name">${w}</span><span class="card-hours">${sum}h</span>`;
            dash.appendChild(card);
        });
    }

    function toggleWorker(name) {
        document.getElementById('reportWrapper').style.display = "none";
        if (activeWorker === name || name === "") {
            activeWorker = ""; document.getElementById('detailsWrapper').style.display = "none";
        } else {
            activeWorker = name; loadWorkerData(name);
            document.getElementById('detailsWrapper').style.display = "block";
        }
        renderDashboard();
    }

    function loadWorkerData(name) {
        document.getElementById('currentWorkerName').innerText = name;
        const data = allHoursData[name]?.days || Array(7).fill({s:"", e:"", r:"0.00"});
        data.forEach((day, i) => {
            document.getElementById(`s${i}`).value = day.s;
            document.getElementById(`e${i}`).value = day.e;
            document.getElementById(`r${i}`).innerText = day.r;
        });
        document.getElementById('grandTotal').innerText = allHoursData[name]?.total || "0.00";
    }

    function saveData(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`r${i}`);
        let diff = 0;
        if(s && e) {
            let sP = s.split(':'), eP = e.split(':');
            diff = (parseInt(eP[0]) + parseInt(eP[1])/60) - (parseInt(sP[0]) + parseInt(sP[1])/60);
            if (diff < 0) diff += 24;
            out.innerText = diff.toFixed(2);
        } else { out.innerText = "0.00"; }

        let total = 0, days = [];
        for(let j=0; j<7; j++) {
            total += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
            days.push({s:document.getElementById(`s${j}`).value, e:document.getElementById(`e${j}`).value, r:document.getElementById(`r${j}`).innerText});
        }
        allHoursData[activeWorker] = { total: total.toFixed(2), days: days };
        localStorage.setItem('godzinyPizzaDetailedData', JSON.stringify(allHoursData));
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        renderDashboard();
    }

    function toggleReport() {
        const rw = document.getElementById('reportWrapper');
        const dw = document.getElementById('detailsWrapper');
        activeWorker = ""; dw.style.display = "none"; renderDashboard();
        if(rw.style.display === "block") rw.style.display = "none";
        else { updateReport(); rw.style.display = "block"; }
    }

    function updateReport() {
        const content = document.getElementById('reportContent');
        const header = document.getElementById('reportHeader');
        const mon = new Date(document.getElementById('mondayDate').value);
        header.innerText = `RAPORT: ${mon.toLocaleDateString()} - ${new Date(new Date(mon).setDate(mon.getDate()+6)).toLocaleDateString()}`;
        content.innerHTML = "";
        workers.forEach(w => {
            const data = allHoursData[w]; if(!data) return;
            let htm = `<div class="report-item"><h3>${w} - Suma: ${data.total}h</h3><table class="report-table"><tr>`;
            daysArr.forEach(dn => htm += `<th>${dn}</th>`);
            htm += `</tr><tr>`;
            data.days.forEach(d => htm += `<td>${d.r > 0 ? d.r : '-'}</td>`);
            htm += `</tr></table></div>`;
            content.innerHTML += htm;
        });
    }

    function setWolne(i) { document.getElementById(`s${i}`).value = "00:00"; document.getElementById(`e${i}`).value = "00:00"; saveData(i); }
    function updateTableDates() {
        const mon = new Date(document.getElementById('mondayDate').value);
        daysArr.forEach((_, i) => { if (i > 0) {
            const cur = new Date(mon); cur.setDate(mon.getDate() + i);
            document.getElementById(`date-${i}`).innerText = cur.toLocaleDateString().slice(0,5);
        }});
    }

    // LISTA PRACOWNIKÓW Z USUWANIEM
    function toggleEdit() { 
        const s = document.getElementById('editSection'); 
        if(s.style.display === 'block') s.style.display = 'none';
        else { renderEditList(); s.style.display = 'block'; }
    }

    function renderEditList() {
        const list = document.getElementById('inputList');
        list.innerHTML = "";
        workers.forEach((w, index) => {
            list.innerHTML += `<div class="worker-edit-row">
                <input type="text" class="worker-input" value="${w}" style="flex:1; padding:8px;">
                <button class="btn-del" onclick="removeWorker(${index})">X</button>
            </div>`;
        });
        if(workers.length === 0) addNewWorkerField();
    }

    function addNewWorkerField() {
        const list = document.getElementById('inputList');
        list.innerHTML += `<div class="worker-edit-row">
            <input type="text" class="worker-input" value="" placeholder="Nowe imię" style="flex:1; padding:8px;">
            <button class="btn-del" onclick="this.parentElement.remove()">X</button>
        </div>`;
    }

    function removeWorker(index) {
        if(confirm(`Czy na pewno usunąć: ${workers[index]}?`)) {
            workers.splice(index, 1);
            renderEditList();
        }
    }

    function saveWorkers() {
        let inputs = document.querySelectorAll('.worker-input');
        let nw = [];
        inputs.forEach(inp => { if(inp.value.trim()) nw.push(inp.value.trim()); });
        workers = nw;
        localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderDashboard();
        toggleEdit();
    }

    init();
</script>
</body>
</html>
