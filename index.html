            <button class="btn btn-print" onclick="window.print()">🖨️ Drukuj PDF</button>
        </div>
        <div id="editSection">
            <div id="inputContainer"></div>
            <button class="btn" style="background:#2ecc71; color:white; margin-top:10px; width:100%" onclick="saveWorkers()">ZAPISZ LISTĘ</button>
        </div>
    </div>

    <div style="text-align:center">
        <h1 id="displayWorker">Godziny Pizza</h1>
        <p id="displayDates" style="color: #666; font-weight: bold;"></p>
    </div>

    <table>
        <thead>
            <tr><th>Dzień</th><th>Data</th><th>Od — Do</th><th>Suma (h)</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3" style="text-align:right; padding-right:15px">RAZEM W TYGODNIU:</td>
                <td id="grandTotal">0.00</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    const daysArr = ["Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota", "Niedziela"];
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];

    function getTimeOptions() {
        let htm = '';
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=30) {
                let hh = h<10?'0'+h:h, mm = m===0?'00':m;
                htm += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        return htm;
    }

    function init() {
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));
        document.getElementById('displayDates').innerText = `Tydzień od ${mon.toLocaleDateString()}`;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const tOpts = getTimeOptions();

        daysArr.forEach((d, i) => {
            const date = new Date(mon); date.setDate(mon.getDate() + i);
            tbody.innerHTML += `
                <tr>
                    <td><strong>${d}</strong></td>
                    <td>${date.toLocaleDateString()}</td>
                    <td>
                        <select id="s${i}" onchange="calc(${i})">${tOpts}</select>
                        <select id="e${i}" onchange="calc(${i})">${tOpts}</select>
                        <button class="btn-wolne no-print" onclick="setWolne(${i})">Wolne</button>
                    </td>
                    <td id="r${i}" style="font-weight:bold; color:var(--primary)">0.00</td>
                </tr>`;
        });
        renderWorkers();
    }

    function changeWorker() {
        const val = document.getElementById('workerSelect').value;
        document.getElementById('displayWorker').innerText = val || "Godziny Pizza";
        for(let i=0; i<7; i++) { setWolne(i); }
    }

    function setWolne(i) {
        document.getElementById(`s${i}`).value = "00:00";
        document.getElementById(`e${i}`).value = "00:00";
        calc(i);
    }

    function renderWorkers() {
        const sel = document.getElementById('workerSelect'), con = document.getElementById('inputContainer');
        sel.innerHTML = '<option value="">-- Wybierz osobę --</option>'; con.innerHTML = "";
        for(let i=0; i<10; i++) {
            const v = workers[i] || "";
            if(v) sel.innerHTML += `<option value="${v}">${v}</option>`;
            con.innerHTML += `<input type="text" style="width:100%; margin-bottom:5px; padding:8px;" id="winp${i}" value="${v}" placeholder="Pracownik ${i+1}">`;
        }
    }

    function toggleEdit() { const s = document.getElementById('editSection'); s.style.display = s.style.display==='block'?'none':'block'; }

    function saveWorkers() {
        for(let i=0; i<10; i++) workers[i] = document.getElementById(`winp${i}`).value.trim();
        localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderWorkers(); toggleEdit();
    }

    function calc(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`r${i}`);
        let startParts = s.split(':'), endParts = e.split(':');
        let d = (parseInt(endParts[0]) + parseInt(endParts[1])/60) - (parseInt(startParts[0]) + parseInt(startParts[1])/60);
        if (d < 0) d += 24;
        out.innerText = (s === e) ? "0.00" : d.toFixed(2);
        let t = 0; for(let j=0; j<7; j++) t += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
        document.getElementById('grandTotal').innerText = t.toFixed(2);
    }
    init();
</script>
</body>
</html>
