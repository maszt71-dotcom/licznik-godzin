<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godziny Pizza - Panel Sterowania</title>
    <style>
        :root { --primary: #e67e22; --primary-dark: #d35400; --bg: #f0f2f5; --text: #1a1a1b; --white: #ffffff; --shadow: 0 4px 6px rgba(0,0,0,0.07); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-size: 2rem; }
        
        /* MENU GŁÓWNE / DASHBOARD */
        .main-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        .worker-card { 
            background: var(--white); padding: 20px; border-radius: 16px; text-align: center; 
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .worker-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--primary); }
        .worker-card.active { border-color: var(--primary); background: #fffcf4; box-shadow: 0 0 15px rgba(230,126,34,0.2); }
        
        /* STYL DLA NOWYCH AWATARÓW (LUDZIKÓW) */
        .worker-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%; /* okrągłe */
            background-color: #eee; /* kolor tła, gdy nie ma obrazka */
            margin-bottom: 10px;
            object-fit: cover; /* zachowuje proporcje */
            border: 3px solid var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-name { font-weight: 700; font-size: 1rem; color: var(--text); }
        .card-hours { font-size: 1.6rem; font-weight: 900; color: var(--primary); }

        /* TABELA EDYCJI */
        #detailsWrapper { 
            display: none; background: var(--white); padding: 25px; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 40px; border: 1px solid #eee;
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f8f9fa; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #f8f9fa; color: #666; padding: 12px; text-transform: uppercase; font-size: 0.75rem; font-weight: 800; border: 1px solid #eee; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 0.9rem; }
        .total-row { background: var(--text); color: white; font-weight: bold; }
        
        /* PRZYCISKI */
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem; text-decoration: none;}
        .btn-report { background: #8e44ad; color: white; }
        .btn-report:hover { background: #732d91; }
        .btn-settings { background: #3498db; color: white; }
        .btn-print-final { background: #27ae60; color: white; width: 100%; justify-content: center; }
        .btn-close { background: #e74c3c; color: white; width: 100%; justify-content: center; }
        .btn-wolne { background: #fdf2e9; border: 1px solid #fad7a0; color: #d35400; padding: 4px 8px; border-radius: 6px; font-size: 11px; }
        
        /* RAPORT */
        #reportWrapper { display: none; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .report-item { border: 1px solid #e1e4e8; padding: 10px; border-radius: 10px; }
        .report-worker-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 6px; padding-bottom: 4px; }
        .report-worker-header h3 { margin: 0; font-size: 1rem; color: #333; }
        .highlight-hours { color: var(--primary); font-size: 1.1rem; font-weight: 900; }
        .report-table { font-size: 9px; width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { border: 1px solid #eee; padding: 2px; text-align: center; }

        /* LISTA EDYCJI */
        .worker-edit-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-del { background: #ff7675; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @media print {
            @page { size: A4; margin: 0.5cm; }
            .no-print { display: none !important; }
            #reportWrapper { display: block !important; width: 100%; border:none; padding:0; box-shadow: none; }
            .report-grid { grid-template-columns: 1fr 1fr; }
            .report-item { page-break-inside: avoid; border: 1px solid #000 !important; }
            .highlight-hours { color: #d35400 !important; }
        }
        @media (max-width: 600px) { .report-grid { grid-template-columns: 1fr; } .main-nav { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <h1>🍕 Godziny Pizza</h1>
    </header>

    <div class="main-nav no-print">
        <button class="btn btn-report" onclick="toggleReport()">📄 GENERUJ RAPORT</button>
        <button class="btn btn-settings" onclick="toggleEdit()">⚙️ LISTA OSÓB</button>
    </div>

    <div id="workerDashboard" class="dashboard no-print"></div>

    <div id="reportWrapper">
        <div class="no-print" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee;">
            <h2 style="margin:0; font-size:1.1rem;">Podgląd Raportu A4</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-print-final" onclick="window.print()">🖨️ DRUKUJ</button>
                <button class="btn" style="background:#666; color:white;" onclick="toggleReport()">✕</button>
            </div>
        </div>
        <div id="reportHeader" style="text-align:center; font-weight:bold; margin-bottom:15px; font-size:12px; text-transform: uppercase;"></div>
        <div id="reportContent" class="report-grid"></div>
    </div>

    <div id="detailsWrapper">
        <div class="table-header">
            <h2 id="currentWorkerName" style="margin:0; color:var(--primary);">Pracownik</h2>
            <input type="date" id="mondayDate" class="date-input" onchange="updateTableDates(); updateReport();">
        </div>
        <table>
            <thead><tr><th>Dzień</th><th>Data</th><th>Od — Do</th><th>Suma</th></tr></thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr class="total-row"><td colspan="3" style="text-align:right">SUMA:</td><td id="grandTotal">0.00</td></tr>
            </tfoot>
        </table>
        <button class="btn btn-close no-print" onclick="toggleWorker('')">✕ ZAMKNIJ EDYCJĘ</button>
    </div>

    <div class="admin-tools no-print">
        <div id="editSection" style="display:none; background:white; padding:25px; border-radius:20px; box-shadow: var(--shadow); border: 1px solid #eee;">
            <h3 style="margin-top:0;">Zarządzaj Pracownikami</h3>
            <div id="inputList" style="margin-bottom:20px;"></div>
            <button class="btn" style="background:#2ecc71; color:white; width:100%;" onclick="addNewWorkerField()">+ DODAJ NOWEGO</button>
            <button class="btn" style="background:var(--primary); color:white; width:100%; margin-top:10px;" onclick="saveWorkers()">💾 ZAPISZ ZMIANY</button>
        </div>
    </div>
</div>

<script>
    const daysArr = ["Pn", "Wt", "Śr", "Czw", "Pt", "Sob", "Nie"];
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];
    let allHoursData = JSON.parse(localStorage.getItem('godzinyPizzaDetailedData')) || {}; 
    let activeWorker = "";

    function getTimeOptions() {
        let htm = '<option value="">--</option>'; 
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=30) {
                let hh = h<10?'0'+h:h, mm = m===0?'00':m;
                htm += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        return htm;
    }

    function init() {
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));
        document.getElementById('mondayDate').value = mon.toISOString().split('T')[0];
        
        renderDashboard();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const tOpts = getTimeOptions();

        daysArr.forEach((d, i) => {
            let dateCell = (i === 0) ? `Poniedziałek` : `<span id="date-${i}"></span>`;
            tbody.innerHTML += `<tr><td><strong>${d}</strong></td><td id="date-label-${i}">-</td><td>
                <select id="s${i}" onchange="saveData(${i})">${tOpts}</select>
                <select id="e${i}" onchange="saveData(${i})">${tOpts}</select>
                <button class="btn-wolne no-print" onclick="setWolne(${i})">W</button>
                </td><td id="r${i}" style="font-weight:bold;">0.00</td></tr>`;
        });
        updateTableDates();
    }

    // FUNKCJA GENERUJĄCA DASHBOARD Z GRAFIKAMI
    function renderDashboard() {
        const dash = document.getElementById('workerDashboard');
        dash.innerHTML = "";
        
        // --- !!! WAŻNE !!! ---
        // Tutaj wpisz nazwy plików graficznych, które wgrałeś na GitHub.
        // Program będzie je przypisywał po kolei pracownikom.
        const ludziki = ['ludzik1.png', 'ludzik2.png', 'ludzik3.png', 'ludzik4.png', 'ludzik5.png'];
        
        workers.forEach((w, index) => {
            const sum = allHoursData[w]?.total || "0.00";
            const card = document.createElement('div');
            card.className = `worker-card ${activeWorker === w ? 'active' : ''}`;
            card.onclick = () => toggleWorker(w);
            
            // Wybierz ludzika dla tego pracownika (używamy modulo, by zapętlić listę)
            const ludzikSrc = ludziki[index % ludziki.length];
            
            card.innerHTML = `
                <img src="${ludzikSrc}" alt="Avatar" class="worker-avatar" onerror="this.parentElement.firstChild.innerHTML='👤'; this.style.display='none';">
                <span class="card-name">${w}</span>
                <span class="card-hours">${sum}h</span>
            `;
            dash.appendChild(card);
        });
    }

    function toggleWorker(name) {
        document.getElementById('reportWrapper').style.display = "none";
        document.getElementById('editSection').style.display = "none";
        if (activeWorker === name || name === "") {
            activeWorker = ""; document.getElementById('detailsWrapper').style.display = "none";
        } else {
            activeWorker = name; loadWorkerData(name);
            document.getElementById('detailsWrapper').style.display = "block";
        }
        renderDashboard();
    }

    function loadWorkerData(name) {
        document.getElementById('currentWorkerName').innerText = name;
        const data = allHoursData[name]?.days || Array(7).fill({s:"", e:"", r:"0.00"});
        data.forEach((day, i) => {
            document.getElementById(`s${i}`).value = day.s;
            document.getElementById(`e${i}`).value = day.e;
            document.getElementById(`r${i}`).innerText = day.r;
        });
        document.getElementById('grandTotal').innerText = allHoursData[name]?.total || "0.00";
    }

    function saveData(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`r${i}`);
        let diff = 0;
        if(s && e) {
            let sP = s.split(':'), eP = e.split(':');
            diff = (parseInt(eP[0]) + parseInt(eP[1])/60) - (parseInt(sP[0]) + parseInt(sP[1])/60);
            if (diff < 0) diff += 24;
            out.innerText = diff.toFixed(2);
        } else { out.innerText = "0.00"; }

        let total = 0, days = [];
        for(let j=0; j<7; j++) {
            total += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
            days.push({s:document.getElementById(`s${j}`).value, e:document.getElementById(`e${j}`).value, r:document.getElementById(`r${j}`).innerText});
        }
        allHoursData[activeWorker] = { total: total.toFixed(2), days: days };
        localStorage.setItem('godzinyPizzaDetailedData', JSON.stringify(allHoursData));
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        renderDashboard();
    }

    function toggleReport() {
        const rw = document.getElementById('reportWrapper');
        activeWorker = ""; document.getElementById('detailsWrapper').style.display = "none";
        document.getElementById('editSection').style.display = "none";
        renderDashboard();
        if(rw.style.display === "block") rw.style.display = "none";
        else { updateReport(); rw.style.display = "block"; }
    }

    function updateReport() {
        const content = document.getElementById('reportContent');
        const header = document.getElementById('reportHeader');
        const mon = new Date(document.getElementById('mondayDate').value);
        header.innerText = `OKRES: ${mon.toLocaleDateString()} - ${new Date(new Date(mon).setDate(mon.getDate()+6)).toLocaleDateString()}`;
        content.innerHTML = "";
        workers.forEach(w => {
            const data = allHoursData[w]; if(!data) return;
            let htm = `<div class="report-item"><div class="report-worker-header"><h3>${w}</h3><div class="highlight-hours">${data.total}h</div></div><table class="report-table"><tr>`;
            daysArr.forEach(dn => htm += `<th>${dn}</th>`);
            htm += `</tr><tr>`;
            data.days.forEach(d => htm += `<td>${d.r > 0 ? d.r : '-'}</td>`);
            htm += `</tr></table></div>`;
            content.innerHTML += htm;
        });
    }

    function setWolne(i) { document.getElementById(`s${i}`).value = "00:00"; document.getElementById(`e${i}`).value = "00:00"; saveData(i); }
    
    function updateTableDates() {
        const monVal = document.getElementById('mondayDate').value;
        if(!monVal) return;
        const mon = new Date(monVal);
        daysArr.forEach((_, i) => {
            const cur = new Date(mon); cur.setDate(mon.getDate() + i);
            const target = document.getElementById(`date-label-${i}`);
            if(target) target.innerText = cur.toLocaleDateString().slice(0,5);
        });
    }

    function toggleEdit() { 
        const s = document.getElementById('editSection'); 
        document.getElementById('detailsWrapper').style.display = "none";
        document.getElementById('reportWrapper').style.display = "none";
        if(s.style.display === 'block') s.style.display = 'none';
        else { renderEditList(); s.style.display = 'block'; }
    }

    function renderEditList() {
        const list = document.getElementById('inputList');
        list.innerHTML = "";
        workers.forEach((w, index) => {
            list.innerHTML += `<div class="worker-edit-row">
                <input type="text" class="worker-input" value="${w}" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd;">
                <button class="btn-del" onclick="removeWorker(${index})">USUŃ</button>
            </div>`;
        });
        if(workers.length === 0) addNewWorkerField();
    }

    function addNewWorkerField() {
        const list = document.getElementById('inputList');
        const div = document.createElement('div');
        div.className = "worker-edit-row";
        div.innerHTML = `<input type="text" class="worker-input" value="" placeholder="Imię" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd;">
                         <button class="btn-del" onclick="this.parentElement.remove()">USUŃ</button>`;
        list.appendChild(div);
    }

    function removeWorker(index) {
        if(confirm(`Usunąć: ${workers[index]}?`)) {
            workers.splice(index, 1);
            renderEditList();
        }
    }

    function saveWorkers() {
        let inputs = document.querySelectorAll('.worker-input');
        let nw = [];
        inputs.forEach(inp => { if(inp.value.trim()) nw.push(inp.value.trim()); });
        workers = nw;
        localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderDashboard();
        toggleEdit();
    }

    init();
</script>
</body>
</html>
