<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godziny Pizza - Panel</title>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --text: #2c3e50; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* NAGŁÓWEK I MENU */
        header { text-align: center; margin-bottom: 25px; }
        h1 { margin: 0; color: var(--primary); text-transform: uppercase; font-size: 1.8rem; }
        .main-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }

        /* DASHBOARD - KAFELKI */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .worker-card { 
            background: var(--white); padding: 20px; border-radius: 15px; text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .worker-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .worker-card.active { border-color: var(--primary); background: #fffcf4; }
        .card-name { display: block; font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: var(--text); }
        .card-hours { font-size: 1.5rem; font-weight: 900; color: var(--primary); }

        /* TABELA EDYCJI */
        #detailsWrapper { 
            display: none; background: var(--white); padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 30px;
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { background: #f8f9fa; padding: 10px; font-size: 0.8rem; border: 1px solid #eee; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        
        /* PRZYCISKI */
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-report { background: #8e44ad; color: white; }
        .btn-settings { background: #3498db; color: white; }
        .btn-save { background: #27ae60; color: white; width: 100%; }
        .btn-close { background: #95a5a6; color: white; width: 100%; margin-top: 10px; }
        .btn-wolne { background: #f8f9fa; border: 1px solid #ddd; padding: 3px 7px; border-radius: 4px; font-size: 10px; }

        /* RAPORT A4 */
        #reportWrapper { display: none; background: white; padding: 15px; border-radius: 15px; margin-top: 20px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .report-item { border: 1px solid #000; padding: 8px; margin-bottom: 5px; }
        .report-worker-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; margin-bottom: 5px; }
        .report-worker-header h3 { margin: 0; font-size: 0.9rem; font-weight: bold; }
        .highlight-hours { color: var(--primary); font-size: 1.1rem; font-weight: 900; }
        .report-table { font-size: 9px; width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 2px; text-align: center; }

        /* LISTA EDYCJI */
        .worker-edit-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; }

        @media print {
            .no-print { display: none !important; }
            #reportWrapper { display: block !important; width: 100%; border:none; padding:0; }
            .report-grid { grid-template-columns: 1fr 1fr; gap: 5px; }
            .highlight-hours { color: #000 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <h1>🍕 Godziny Pizza</h1>
    </header>

    <div class="main-buttons no-print">
        <button class="btn btn-report" onclick="toggleReport()">📄 RAPORT</button>
        <button class="btn btn-settings" onclick="toggleEdit()">⚙️ USTAWIENIA</button>
    </div>

    <div id="workerDashboard" class="dashboard no-print"></div>

    <div id="reportWrapper">
        <div class="no-print" style="display:flex; justify-content: space-between; margin-bottom: 15px;">
            <button class="btn btn-save" style="width:auto" onclick="window.print()">🖨️ DRUKUJ A4</button>
            <button class="btn btn-close" style="width:auto; margin:0" onclick="toggleReport()">✕ ZAMKNIJ</button>
        </div>
        <div id="reportHeader" style="text-align:center; font-weight:bold; margin-bottom:10px;"></div>
        <div id="reportContent" class="report-grid"></div>
    </div>

    <div id="detailsWrapper">
        <div class="table-header">
            <h2 id="currentWorkerName" style="margin:0; color:var(--primary);">Pracownik</h2>
            <input type="date" id="mondayDate" style="padding:5px;" onchange="updateTableDates(); updateReport();">
        </div>
        <table>
            <thead><tr><th>Dzień</th><th>Data</th><th>Od — Do</th><th>Suma</th></tr></thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr style="background:#2c3e50; color:white; font-weight:bold;">
                    <td colspan="3" style="text-align:right">SUMA:</td><td id="grandTotal">0.00</td>
                </tr>
            </tfoot>
        </table>
        <button class="btn btn-close no-print" onclick="toggleWorker('')">✕ ZAMKNIJ EDYCJĘ</button>
    </div>

    <div id="editSection" class="no-print" style="display:none; background:white; padding:20px; border-radius:15px; border:1px solid #ddd;">
        <h3 style="margin-top:0;">Lista Pracowników</h3>
        <div id="inputList"></div>
        <button class="btn btn-settings" style="width:100%; margin-bottom:10px;" onclick="addNewWorkerField()">+ DODAJ MIEJSCE</button>
        <button class="btn btn-save" onclick="saveWorkers()">💾 ZAPISZ LISTĘ</button>
        <button class="btn btn-close" onclick="toggleEdit()">✕ ZAMKNIJ</button>
    </div>
</div>

<script>
    const daysArr = ["Pn", "Wt", "Śr", "Czw", "Pt", "Sob", "Nie"];
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];
    let allHoursData = JSON.parse(localStorage.getItem('godzinyPizzaDetailedData')) || {}; 
    let activeWorker = "";

    function getTimeOptions() {
        let htm = '<option value="">--</option>'; 
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=30) {
                let hh = h<10?'0'+h:h, mm = m===0?'00':m;
                htm += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        return htm;
    }

    function init() {
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));
        document.getElementById('mondayDate').value = mon.toISOString().split('T')[0];
        
        renderDashboard();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const tOpts = getTimeOptions();

        daysArr.forEach((d, i) => {
            tbody.innerHTML += `<tr><td><strong>${d}</strong></td><td id="date-label-${i}">-</td><td>
                <select id="s${i}" onchange="saveData(${i})">${tOpts}</select>
                <select id="e${i}" onchange="saveData(${i})">${tOpts}</select>
                <button class="btn-wolne no-print" onclick="setWolne(${i})">W</button>
                </td><td id="r${i}" style="font-weight:bold;">0.00</td></tr>`;
        });
        updateTableDates();
    }

    function renderDashboard() {
        const dash = document.getElementById('workerDashboard');
        dash.innerHTML = "";
        workers.forEach(w => {
            const sum = allHoursData[w]?.total || "0.00";
            const card = document.createElement('div');
            card.className = `worker-card ${activeWorker === w ? 'active' : ''}`;
            card.onclick = () => toggleWorker(w);
            card.innerHTML = `<span class="card-name">${w}</span><span class="card-hours">${sum}h</span>`;
            dash.appendChild(card);
        });
    }

    function toggleWorker(name) {
        document.getElementById('reportWrapper').style.display = "none";
        document.getElementById('editSection').style.display = "none";
        if (activeWorker === name || name === "") {
            activeWorker = ""; document.getElementById('detailsWrapper').style.display = "none";
        } else {
            activeWorker = name; loadWorkerData(name);
            document.getElementById('detailsWrapper').style.display = "block";
            window.scrollTo({ top: document.getElementById('detailsWrapper').offsetTop - 20, behavior: 'smooth' });
        }
        renderDashboard();
    }

    function loadWorkerData(name) {
        document.getElementById('currentWorkerName').innerText = name;
        const data = allHoursData[name]?.days || Array(7).fill({s:"", e:"", r:"0.00"});
        data.forEach((day, i) => {
            document.getElementById(`s${i}`).value = day.s;
            document.getElementById(`e${i}`).value = day.e;
            document.getElementById(`r${i}`).innerText = day.r;
        });
        document.getElementById('grandTotal').innerText = allHoursData[name]?.total || "0.00";
    }

    function saveData(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`r${i}`);
        let diff = 0;
        if(s && e) {
            let sP = s.split(':'), eP = e.split(':');
            diff = (parseInt(eP[0]) + parseInt(eP[1])/60) - (parseInt(sP[0]) + parseInt(sP[1])/60);
            if (diff < 0) diff += 24;
            out.innerText = diff.toFixed(2);
        } else { out.innerText = "0.00"; }

        let total = 0, days = [];
        for(let j=0; j<7; j++) {
            total += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
            days.push({s:document.getElementById(`s${j}`).value, e:document.getElementById(`e${j}`).value, r:document.getElementById(`r${j}`).innerText});
        }
        allHoursData[activeWorker] = { total: total.toFixed(2), days: days };
        localStorage.setItem('godzinyPizzaDetailedData', JSON.stringify(allHoursData));
        document.getElementById('grandTotal').innerText = total.toFixed(2);
        renderDashboard();
    }

    function toggleReport() {
        const rw = document.getElementById('reportWrapper');
        activeWorker = ""; document.getElementById('detailsWrapper').style.display = "none";
        document.getElementById('editSection').style.display = "none";
        renderDashboard();
        if(rw.style.display === "block") rw.style.display = "none";
        else { updateReport(); rw.style.display = "block"; }
    }

    function updateReport() {
        const content = document.getElementById('reportContent');
        const header = document.getElementById('reportHeader');
        const mon = new Date(document.getElementById('mondayDate').value);
        header.innerText = `RAPORT: ${mon.toLocaleDateString()} - ${new Date(new Date(mon).setDate(mon.getDate()+6)).toLocaleDateString()}`;
        content.innerHTML = "";
        workers.forEach(w => {
            const data = allHoursData[w]; if(!data) return;
            let htm = `<div class="report-item"><div class="report-worker-header"><h3>${w}</h3><div class="highlight-hours">${data.total}h</div></div><table class="report-table"><tr>`;
            daysArr.forEach(dn => htm += `<th>${dn}</th>`);
            htm += `</tr><tr>`;
            data.days.forEach(d => htm += `<td>${d.r > 0 ? d.r : '-'}</td>`);
            htm += `</tr></table></div>`;
            content.innerHTML += htm;
        });
    }

    function setWolne(i) { document.getElementById(`s${i}`).value = "00:00"; document.getElementById(`e${i}`).value = "00:00"; saveData(i); }
    
    function updateTableDates() {
        const monVal = document.getElementById('mondayDate').value;
        if(!monVal) return;
        const mon = new Date(monVal);
        daysArr.forEach((_, i) => {
            const cur = new Date(mon); cur.setDate(mon.getDate() + i);
            document.getElementById(`date-label-${i}`).innerText = cur.toLocaleDateString().slice(0,5);
        });
    }

    function toggleEdit() { 
        const s = document.getElementById('editSection'); 
        document.getElementById('detailsWrapper').style.display = "none";
        document.getElementById('reportWrapper').style.display = "none";
        if(s.style.display === 'block') s.style.display = 'none';
        else { renderEditList(); s.style.display = 'block'; }
    }

    function renderEditList() {
        const list = document.getElementById('inputList');
        list.innerHTML = "";
        workers.forEach((w, index) => {
            list.innerHTML += `<div class="worker-edit-row">
                <input type="text" class="worker-input" value="${w}" style="flex:1; padding:8px;">
                <button class="btn-del" onclick="removeWorker(${index})">X</button>
            </div>`;
        });
        if(workers.length === 0) addNewWorkerField();
    }

    function addNewWorkerField() {
        const list = document.getElementById('inputList');
        const div = document.createElement('div');
        div.className = "worker-edit-row";
        div.innerHTML = `<input type="text" class="worker-input" value="" placeholder="Imię" style="flex:1; padding:8px;">
                         <button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
        list.appendChild(div);
    }

    function removeWorker(index) {
        if(confirm(`Usunąć: ${workers[index]}?`)) {
            workers.splice(index, 1);
            renderEditList();
        }
    }

    function saveWorkers() {
        let inputs = document.querySelectorAll('.worker-input');
        let nw = [];
        inputs.forEach(inp => { if(inp.value.trim()) nw.push(inp.value.trim()); });
        workers = nw;
        localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderDashboard();
        toggleEdit();
    }

    init();
</script>
</body>
</html>
