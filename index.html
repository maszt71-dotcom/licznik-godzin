<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik Godzin - GitHub Edition</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        input[type="text"] { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 300px; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f5f9; text-align: left; padding: 12px; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        input[type="time"] { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; }
        .row-sum { font-weight: 700; color: var(--primary); }
        .total-box { margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; text-align: right; font-size: 1.2rem; }
        @media print { .no-print { display: none; } .card { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Tygodniowy Arkusz Godzin</h1>
    
    <div class="input-group">
        <label><strong>Pracownik:</strong></label><br>
        <input type="text" id="name" placeholder="Imię i Nazwisko">
    </div>

    <table>
        <thead>
            <tr>
                <th>Dzień</th>
                <th>Data</th>
                <th>Od</th>
                <th>Do</th>
                <th>Suma (h)</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

    <div class="total-box">
        <strong>RAZEM W TYGODNIU: <span id="grandTotal">0.00</span> h</strong>
    </div>

    <button class="no-print" onclick="window.print()" style="margin-top: 20px; padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;">
        Wygeneruj PDF / Drukuj
    </button>
</div>

<script>
    const days = ["Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota", "Niedziela"];
    
    function init() {
        const today = new Date();
        const dayOfWeek = today.getDay(); // 0 (Nie) to 6 (Sob)
        const diffToMonday = today.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
        const monday = new Date(today.setDate(diffToMonday));

        const tbody = document.getElementById('rows');
        
        days.forEach((day, i) => {
            const current = new Date(monday);
            current.setDate(monday.getDate() + i);
            const dateStr = current.toLocaleDateString('pl-PL');

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${day}</td>
                <td>${dateStr}</td>
                <td><input type="time" id="s${i}" oninput="calc(${i})"></td>
                <td><input type="time" id="e${i}" oninput="calc(${i})"></td>
                <td class="row-sum" id="res${i}">0.00</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function calc(i) {
        const s = document.getElementById(`s${i}`).value;
        const e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`res${i}`);

        if (s && e) {
            const start = new Date(`2000-01-01T${s}`);
            const end = new Date(`2000-01-01T${e}`);
            let diff = (end - start) / (1000 * 60 * 60);
            if (diff < 0) diff += 24; 
            out.innerText = diff.toFixed(2);
        }
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        for(let i=0; i<7; i++) {
            total += parseFloat(document.getElementById(`res${i}`).innerText) || 0;
        }
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    init();
</script>

</body>
</html>
