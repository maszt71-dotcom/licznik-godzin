<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godziny Pizza - Podsumowanie</title>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 950px; }
        .no-print { background: #fff8f2; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        
        /* Kafelki z imionami i godzinami u góry */
        .summary-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 25px; background: #fff; border: 2px solid var(--primary); padding: 15px; border-radius: 10px; box-shadow: inset 0 0 10px rgba(230,126,34,0.1); }
        .summary-item { text-align: center; padding: 12px; background: #fff; border-radius: 6px; border: 1px solid #fab1a0; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .summary-name { font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 5px; color: #d35400; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .summary-hours { font-size: 1.3rem; font-weight: 900; color: #2c3e50; }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-top: 15px; }
        select { padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; background: white; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 12px; text-transform: uppercase; font-size: 0.9rem; }
        td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .total-row { background: #2c3e50; color: white; font-weight: bold; font-size: 1.1rem; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-print { background: #27ae60; color: white; }
        .btn-edit { background: #3498db; color: white; }
        .btn-wolne { background: #fff0f0; border: 1px solid #ffcccc; color: #c0392b; padding: 5px 12px; font-size: 12px; border-radius: 4px; margin-left: 10px; cursor: pointer; font-weight: bold; }
        #editSection { display: none; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; }
        @media print { .no-print, .btn-wolne, .summary-box { display: none !important; } .card { box-shadow: none; border: none; width: 100%; } select { border: none; -webkit-appearance: none; appearance: none; color: black; font-weight: bold; } }
    </style>
</head>
<body>

<div class="card">
    <div class="no-print">
        <h3 style="margin-top:0; color:var(--primary); text-align:center;">PODGLĄD GODZIN ZESPOŁU</h3>
        <div id="summaryDisplay" class="summary-box">
            </div>

        <div class="controls">
            <div>
                <label style="font-weight:bold;">Wybierz pracownika do edycji:</label><br>
                <select id="workerSelect" onchange="changeWorker()"></select>
            </div>
            <button class="btn btn-edit" onclick="toggleEdit()">⚙️ Zarządzaj listą</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Drukuj PDF</button>
        </div>
        <div id="editSection">
            <h4 style="margin-bottom:10px;">Wpisz imiona pracowników:</h4>
            <div id="inputContainer"></div>
            <button class="btn" style="background:#2ecc71; color:white; margin-top:10px; width:100%" onclick="saveWorkers()">ZATWIERDŹ I ZAPISZ IMIONA</button>
        </div>
    </div>

    <div style="text-align:center">
        <h1 id="displayWorker" style="margin-bottom:5px;">Godziny Pizza</h1>
        <p id="displayDates" style="color: #666; font-weight: bold; margin-top:0;"></p>
    </div>

    <table>
        <thead>
            <tr><th>Dzień</th><th>Data</th><th>Od — Do</th><th>Suma (h)</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3" style="text-align:right; padding-right:15px">SUMA (TEN ARKUSZ):</td>
                <td id="grandTotal">0.00</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    const daysArr = ["Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota", "Niedziela"];
    let workers = JSON.parse(localStorage.getItem('godzinyPizzaWorkers')) || [];
    let allHours = JSON.parse(localStorage.getItem('godzinyPizzaAllSums')) || {};

    function getTimeOptions() {
        let htm = '<option value="">--:--</option>'; 
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=30) {
                let hh = h<10?'0'+h:h, mm = m===0?'00':m;
                htm += `<option value="${hh}:${mm}">${hh}:${mm}</option>`;
            }
        }
        return htm;
    }

    function init() {
        const now = new Date();
        const mon = new Date(now.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)));
        document.getElementById('displayDates').innerText = `Tydzień: ${mon.toLocaleDateString()} - ${new Date(new Date(mon).setDate(mon.getDate()+6)).toLocaleDateString()}`;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const tOpts = getTimeOptions();

        daysArr.forEach((d, i) => {
            const date = new Date(mon); date.setDate(mon.getDate() + i);
            tbody.innerHTML += `
                <tr>
                    <td><strong>${d}</strong></td>
                    <td>${date.toLocaleDateString()}</td>
                    <td>
                        <select id="s${i}" onchange="calc(${i})">${tOpts}</select>
                        <select id="e${i}" onchange="calc(${i})">${tOpts}</select>
                        <button class="btn-wolne no-print" onclick="setWolne(${i})">Wolne</button>
                    </td>
                    <td id="r${i}" style="font-weight:bold; color:var(--primary)">0.00</td>
                </tr>`;
        });
        renderWorkers();
        updateSummary();
    }

    function changeWorker() {
        const currentWorker = document.getElementById('workerSelect').value;
        document.getElementById('displayWorker').innerText = currentWorker || "Godziny Pizza";
        for(let i=0; i<7; i++) {
            document.getElementById(`s${i}`).value = "";
            document.getElementById(`e${i}`).value = "";
            document.getElementById(`r${i}`).innerText = "0.00";
        }
        document.getElementById('grandTotal').innerText = "0.00";
    }

    function setWolne(i) {
        document.getElementById(`s${i}`).value = "00:00";
        document.getElementById(`e${i}`).value = "00:00";
        calc(i);
    }

    function renderWorkers() {
        const sel = document.getElementById('workerSelect'), con = document.getElementById('inputContainer');
        sel.innerHTML = '<option value="">-- Wybierz osobę --</option>'; con.innerHTML = "";
        for(let i=0; i<10; i++) {
            let v = workers[i] || "";
            if(v) sel.innerHTML += `<option value="${v}">${v}</option>`;
            con.innerHTML += `<input type="text" style="width:96%; margin-bottom:6px; padding:10px; border:1px solid #ccc; border-radius:4px;" id="winp${i}" value="${v}" placeholder="Pracownik ${i+1}">`;
        }
    }

    function updateSummary() {
        const display = document.getElementById('summaryDisplay');
        display.innerHTML = "";
        let count = 0;
        workers.forEach(w => {
            if(w) {
                count++;
                const h = allHours[w] || "0.00";
                display.innerHTML += `
                    <div class="summary-item">
                        <span class="summary-name">${w}</span>
                        <span class="summary-hours">${h}</span>
                    </div>`;
            }
        });
        if(count === 0) display.innerHTML = "<p style='width:100%; text-align:center; color:#888;'>Użyj przycisku Zarządzaj listą, aby dodać pracowników.</p>";
    }

    function toggleEdit() { const s = document.getElementById('editSection'); s.style.display = s.style.display==='block'?'none':'block'; }

    function saveWorkers() {
        let newWorkers = [];
        for(let i=0; i<10; i++) {
            let val = document.getElementById(`winp${i}`).value.trim();
            if(val) newWorkers.push(val);
        }
        workers = newWorkers;
        localStorage.setItem('godzinyPizzaWorkers', JSON.stringify(workers));
        renderWorkers(); toggleEdit(); updateSummary();
    }

    function calc(i) {
        const s = document.getElementById(`s${i}`).value, e = document.getElementById(`e${i}`).value;
        const out = document.getElementById(`r${i}`);
        if(!s || !e) { out.innerText = "0.00"; }
        else {
            let sP = s.split(':'), eP = e.split(':');
            let d = (parseInt(eP[0]) + parseInt(eP[1])/60) - (parseInt(sP[0]) + parseInt(sP[1])/60);
            if (d < 0) d += 24;
            out.innerText = (s === e && s === "00:00") ? "0.00" : d.toFixed(2);
        }
        
        let t = 0; for(let j=0; j<7; j++) t += parseFloat(document.getElementById(`r${j}`).innerText) || 0;
        const finalSum = t.toFixed(2);
        document.getElementById('grandTotal').innerText = finalSum;

        const currentWorker = document.getElementById('workerSelect').value;
        if(currentWorker) {
            allHours[currentWorker] = finalSum;
            localStorage.setItem('godzinyPizzaAllSums', JSON.stringify(allHours));
            updateSummary();
        }
    }
    init();
</script>
</body>
</html>
